# =============================================================================
# RBAC Hardening - SimpleCo Insurance
# Blueprint: blueprint_e2a16d54
# =============================================================================

# -----------------------------------------------------------------------------
# RBAC Assessment — Audit Scope
# -----------------------------------------------------------------------------
rbac_audit_scope: Full Account

rbac_target_prefixes: []

# -----------------------------------------------------------------------------
# Privilege Hardening — Restrict PUBLIC Role
# -----------------------------------------------------------------------------
rbac_restrict_public: 'Yes'

rbac_public_exceptions:
  - SNOWFLAKE_SAMPLE_DATA

# -----------------------------------------------------------------------------
# Privilege Hardening — Enforce Admin Separation
# -----------------------------------------------------------------------------
rbac_accountadmin_users:
  - ALEX_SAMPLE
  - BREAKGLASS_ADMIN

# -----------------------------------------------------------------------------
# Privilege Hardening — Enforce Managed Access Schemas
# -----------------------------------------------------------------------------
rbac_enforce_managed_access: 'Yes'

# -----------------------------------------------------------------------------
# User & Service Account Provisioning — Assign Functional Roles
# -----------------------------------------------------------------------------
rbac_user_role_assignments:
  - user_name: JORDAN_EXAMPLE
    role_level: ADMIN
    data_product_prefix: CLAIMS_PROD_CLAIMS
  - user_name: JORDAN_EXAMPLE
    role_level: ADMIN
    data_product_prefix: CLAIMS_DEV_CLAIMS
  - user_name: JORDAN_EXAMPLE
    role_level: ADMIN
    data_product_prefix: CLAIMS_TEST_CLAIMS
  - user_name: ALEX_SAMPLE
    role_level: READ
    data_product_prefix: CLAIMS_PROD_CLAIMS

# -----------------------------------------------------------------------------
# User & Service Account Provisioning — Provision Service Accounts
# -----------------------------------------------------------------------------
rbac_service_accounts:
  - account_name: SVC_ETL_CLAIMS
    purpose: ETL pipeline for claims data ingestion
    role_level: ADMIN
    data_product_prefix: CLAIMS_PROD_CLAIMS
    warehouse: CLAIMS_PROD_CLAIMS_WH_GENERAL
  - account_name: SVC_REPORTING_CLAIMS
    purpose: Reporting tool connection for claims analytics
    role_level: READ
    data_product_prefix: CLAIMS_PROD_CLAIMS
    warehouse: CLAIMS_PROD_CLAIMS_WH_GENERAL

# -----------------------------------------------------------------------------
# Monitoring & Compliance — RBAC Monitoring Views
# -----------------------------------------------------------------------------
rbac_monitoring_warehouse: COMPUTE_WH

# -----------------------------------------------------------------------------
# Monitoring & Compliance — Privilege Change Alerts
# -----------------------------------------------------------------------------
rbac_enable_alerts: 'No'
rbac_alert_notification_integration:

# -----------------------------------------------------------------------------
# Monitoring & Compliance — Access Review Report
# -----------------------------------------------------------------------------
rbac_review_frequency: Quarterly
